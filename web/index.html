<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo_alleen_zwart.svg" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/svg+xml" href="/logo_alleen_wit.svg" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>Bingo</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    class FitText extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: "open" });

        this.shadowRoot.innerHTML = `
      <style>
        :host {
          display: block;
          width: 100%;
        }
        span {
          display: inline-block;
          transform-origin: center;
          white-space: nowrap;
        }
      </style>
      <span><slot></slot></span>
    `;

        this._span = this.shadowRoot.querySelector("span");
      }

      connectedCallback() {
        this.resizeObserver = new ResizeObserver(() => this.fit());
        this.resizeObserver.observe(this);

        requestAnimationFrame(() => this.fit());
      }

      disconnectedCallback() {
        this.resizeObserver.disconnect();
      }

      fit() {
        const parentWidth = this.clientWidth;
        const textWidth = this._span.scrollWidth;

        if (textWidth === 0) return;

        const scale = parentWidth / textWidth;
        this._span.style.transform = `scale(${scale})`;
      }
    }

    customElements.define("fit-text", FitText);
  </script>
</body>

</html>
